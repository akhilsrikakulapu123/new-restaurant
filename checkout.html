<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - Madhuri Restaurant</title>
  <link rel="stylesheet" href="menu_style.css" />
  <style>
    .checkout { max-width:720px;margin:20px auto;padding:16px }
    .methods { display:flex; gap:12px }
    .qr { margin-top:12px }
  </style>
</head>
<body>
  <div class="home-nav"><div class="logo"><a href="index.html">Madhuri Restaurant</a></div></div>
  <div class="checkout">
    <h1>Checkout</h1>
    <div id="summary"></div>
    <h3>Choose Payment</h3>
    <div class="methods">
      <label><input type="radio" name="method" value="cod" checked /> Cash on Delivery</label>
      <label><input type="radio" name="method" value="upi" /> UPI</label>
    </div>
    <div style="margin-top:12px">
      <button id="pay">Pay / Place Order</button>
    </div>
    <div id="qr-area" class="qr"></div>
  </div>

  <script>
    function renderSummary(){
      const cart=JSON.parse(localStorage.getItem('cart')||'[]');
      const sumDiv=document.getElementById('summary'); sumDiv.innerHTML=''; let total=0;
      cart.forEach(it=>{ const p=(it.price||'0').match(/(\d+)/); const pn=p?Number(p[1]):0; total+=pn*(it.qty||1); const el=document.createElement('div'); el.textContent=`${it.name} x ${it.qty||1} - ${it.price}`; sumDiv.appendChild(el); });
      const t=document.createElement('p'); t.textContent='Total: Rs.'+total; sumDiv.appendChild(t);
    }

    function simulateUPI(){
      const orderId = 'ORD' + Math.random().toString(36).slice(2,9).toUpperCase();
      // Use qrserver.com to generate the QR image (more reliable than chart.googleapis)
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(orderId);
      const fallback = 'https://upload.wikimedia.org/wikipedia/commons/6/6b/QR_code_for_mobile_English_Wikipedia.png';
      const area=document.getElementById('qr-area');
      area.innerHTML = `<p>Scan this UPI code to pay (simulated):</p><img id="qr-img" src="${qrUrl}" alt="qr" onerror="this.onerror=null;this.src='${fallback}'"/>`;
      // simulate waiting for payment then success
      setTimeout(()=>{
        area.innerHTML = '<p>Payment received. Thank you!</p>';
        localStorage.removeItem('cart');
        setTimeout(()=>{ window.location.href='/success.html'; }, 1500);
      }, 5000);
    }

    document.getElementById('pay').addEventListener('click', ()=>{
      const method = document.querySelector('input[name="method"]:checked').value;
      if (method === 'cod'){
        // Simulate COD order placement
        localStorage.removeItem('cart');
        window.location.href='/success.html';
      } else {
        simulateUPI();
      }
    });

    renderSummary();
  </script>
</body>
</html>
