<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link rel="stylesheet" href="menu_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="home-nav">
        <div class="logo"><a href="index.html">Madhuri Restaurant</a></div>
        <div class="cart-icon"><a href="/cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a></div>
    </div>

    <div class="container">
        <div id="product-area" style="display:flex;flex-direction:column;gap:24px;align-items:flex-start">
            <!-- Product content will be injected here -->
        </div>
    </div>

    <script>
    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function addToCart(item, qty = 1) {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const existing = cart.find(i => i._id === item._id && i.name === item.name);
        if (existing) {
            existing.qty = (existing.qty || 1) + qty;
        } else {
            cart.push(Object.assign({}, item, { qty }));
        }
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    // toast helper (non-blocking)
    function showToast(message) {
        let container = document.querySelector('.toast-container');
        if (!container) {
            container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
        }
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = message;
        container.appendChild(t);
        requestAnimationFrame(() => t.classList.add('show'));
        setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(), 220); }, 1500);
    }

    // update header cart badge on product page
    function updateCartBadge() {
        const nav = document.querySelector('.home-nav');
        if (!nav) return;
        let cartIcon = nav.querySelector('.cart-icon');
        if (!cartIcon) {
            cartIcon = document.createElement('div');
            cartIcon.className = 'cart-icon';
            cartIcon.innerHTML = `<a href="/cart.html"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>`;
            nav.appendChild(cartIcon);
        }
        const badge = cartIcon.querySelector('.cart-badge');
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const total = cart.reduce((s,i)=> s + (i.qty||1),0);
        badge.textContent = total;
    }

    async function loadProduct() {
        const id = getQueryParam('id');
        const area = document.getElementById('product-area');
        if (!id) {
            area.innerHTML = '<p>Invalid product. <a href="menu.html">Back to menu</a></p>';
            return;
        }

        try {
            const res = await fetch(`/api/foods/${id}`);
            if (!res.ok) throw new Error('Not found');
            const item = await res.json();

            area.innerHTML = `
                <div class="product-main" style="display:flex;gap:24px;align-items:flex-start;width:100%">
                    <img src="${item.image}" alt="${item.name}" style="width:260px;height:260px;object-fit:cover;border-radius:8px" />
                    <div>
                        <h1>${item.name}</h1>
                        <p class="price">${item.price}</p>
                        <p style="margin-top:8px">Cuisine: ${item.cuisine || '—'}</p>
                        <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
                            <button id="decr">−</button>
                            <input id="qty" value="1" style="width:48px;text-align:center" />
                            <button id="incr">+</button>
                        </div>
                        <div style="margin-top:16px;display:flex;gap:8px">
                            <button id="add">Add to Cart</button>
                            <button id="buy">Buy Now</button>
                            <button id="view-recipe">View Recipe</button>
                            <a href="/cart.html"><button>View Cart</button></a>
                        </div>
                        <p style="margin-top:12px"><a href="menu.html">Back to menu</a></p>
                    </div>
                </div>

                <div id="suggestions-wrapper" style="width:100%;margin-top:8px;display:block">
                    <h2>You might also like</h2>
                    <div id="suggestions" class="suggestions-row" style="margin-top:12px;display:flex;gap:12px;overflow-x:auto;padding-bottom:6px"></div>
                </div>
            `;

            const qtyInput = document.getElementById('qty');
            document.getElementById('incr').onclick = () => { qtyInput.value = Number(qtyInput.value || 0) + 1; };
            document.getElementById('decr').onclick = () => { qtyInput.value = Math.max(1, Number(qtyInput.value || 1) - 1); };

            document.getElementById('add').onclick = () => {
                const qty = Number(qtyInput.value || 1);
                addToCart(item, qty);
                showToast('Item added to cart');
                updateCartBadge();
            };

            document.getElementById('buy').onclick = () => {
                const qty = Number(qtyInput.value || 1);
                addToCart(item, qty);
                window.location.href = '/checkout.html';
            };

            document.getElementById('view-recipe').onclick = () => {
                showRecipe(item._id, item.name);
            };

            // load suggestions (prioritize same cuisine)
            try {
                const all = await fetch('/api/foods').then(r => r.json());
                const sameCuisine = all.filter(f => f.cuisine === item.cuisine && f._id !== item._id);
                const fallback = all.filter(f => f._id !== item._id);
                const suggestions = (sameCuisine.length ? sameCuisine : fallback).slice(0,6);
                const container = document.getElementById('suggestions');
                suggestions.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'suggested-item';
                    card.innerHTML = `
                        <img src="${s.image}" alt="${s.name}" />
                        <div class="s-name">${s.name}</div>
                        <div class="s-price">${s.price}</div>
                        <button class="add-btn">Add</button>
                    `;

                    // navigate when clicking the card (but not the Add/qty controls)
                    card.addEventListener('click', (ev) => {
                        if (ev.target && ev.target.classList && (ev.target.classList.contains('add-btn') || ev.target.classList.contains('s-incr') || ev.target.classList.contains('s-decr'))) return;
                        window.location.href = `/product.html?id=${s._id}`;
                    });

                    const containerCart = () => JSON.parse(localStorage.getItem('cart')||'[]');
                    const saveCart = (c) => localStorage.setItem('cart', JSON.stringify(c));

                    function renderQtyControls(qty){
                        // remove existing add button if present
                        const existingBtn = card.querySelector('.add-btn');
                        if (existingBtn) existingBtn.remove();
                        // remove existing controls
                        const old = card.querySelector('.s-qty-controls'); if (old) old.remove();
                        const controls = document.createElement('div');
                        controls.className = 's-qty-controls';
                        controls.style = 'display:flex;gap:6px;align-items:center;margin-top:6px';
                        controls.innerHTML = `<button class="s-decr">-</button><span class="s-qty">${qty}</span><button class="s-incr">+</button>`;
                        card.appendChild(controls);

                        controls.querySelector('.s-incr').addEventListener('click', (ev)=>{
                            ev.stopPropagation();
                            const cart = containerCart();
                            const f = cart.find(x=>x._id===s._id);
                            if (f) { f.qty = (f.qty||1) + 1; saveCart(cart); }
                            else { cart.push(Object.assign({}, s, { qty: 1 })); saveCart(cart); }
                            controls.querySelector('.s-qty').textContent = (cart.find(x=>x._id===s._id)||{}).qty || 1;
                            updateCartBadge();
                        });

                        controls.querySelector('.s-decr').addEventListener('click', (ev)=>{
                            ev.stopPropagation();
                            const cart = containerCart();
                            const idx = cart.findIndex(x=>x._id===s._id);
                            if (idx === -1) return;
                            cart[idx].qty = Math.max(0, (cart[idx].qty||1) - 1);
                            if (cart[idx].qty <= 0) { cart.splice(idx,1); saveCart(cart); controls.remove(); restoreAddButton(); }
                            else { saveCart(cart); controls.querySelector('.s-qty').textContent = cart[idx].qty; }
                            updateCartBadge();
                        });
                    }

                    function restoreAddButton(){
                        // if already has add button, skip
                        if (card.querySelector('.add-btn')) return;
                        const btn = document.createElement('button');
                        btn.className = 'add-btn';
                        btn.textContent = 'Add';
                        btn.addEventListener('click', (ev)=>{
                            ev.stopPropagation();
                            addToCart(s,1);
                            showToast('Item added to cart');
                            renderQtyControls( (JSON.parse(localStorage.getItem('cart')||'[]').find(x=>x._id===s._id)||{}).qty || 1 );
                            updateCartBadge();
                        });
                        card.appendChild(btn);
                    }

                    // initialize: if item already in cart, show qty controls
                    const initial = containerCart().find(x=>x._id===s._id);
                    if (initial && initial.qty > 0) {
                        renderQtyControls(initial.qty);
                    } else {
                        // wire Add button
                        card.querySelector('.add-btn').addEventListener('click', (ev) => {
                            ev.stopPropagation();
                            addToCart(s, 1);
                            showToast('Item added to cart');
                            renderQtyControls(1);
                            updateCartBadge();
                        });
                    }

                    container.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load suggestions', err);
            }

        } catch (err) {
            console.error(err);
            area.innerHTML = '<p>Unable to load product. <a href="menu.html">Back to menu</a></p>';
        }
    }

    loadProduct();

    // fetch recipe from backend by foodId and show modal
    async function showRecipe(foodId, name){
        try {
            const res = await fetch(`/api/recipes/${foodId}`);
            let content = '';
            if (res.ok) {
                const data = await res.json();
                content = data.content || 'No recipe content available.';
            } else {
                content = 'Recipe not available for this item.';
            }
            const modal = document.createElement('div');
            modal.className = 'recipe-modal';
            modal.innerHTML = `<div class="recipe-card"><button class="recipe-close">×</button><h2>${name}</h2><pre style="white-space:pre-wrap">${content}</pre></div>`;
            document.body.appendChild(modal);
            modal.querySelector('.recipe-close').addEventListener('click', ()=> modal.remove());
            modal.addEventListener('click', (e)=>{ if (e.target === modal) modal.remove(); });
        } catch (err) {
            console.error(err);
            alert('Unable to load recipe');
        }
    }
    </script>
</body>
</html>
